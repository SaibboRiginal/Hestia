services:
  hub:
    build:
      context: ./Hestia-Hub
    container_name: hestia_hub
    restart: unless-stopped
    ports:
      - "19001:19001"
    environment:
      - HUB_HEALTHCHECK_TIMEOUT=3
      - LOG_HEALTH_ACCESS_MODE=off
      - PYTHONUNBUFFERED=1
    networks:
      - hestia_net

  archive:
    build:
      context: ./Hestia-Archive
    container_name: hestia_archive
    restart: unless-stopped
    ports:
      - "19002:19002"
    environment:
      - DATABASE_URL=${ARCHIVE_DATABASE_URL}
      - HUB_API_URL=http://hestia_hub:19001/api
      - ARCHIVE_SERVICE_BASE_URL=http://hestia_archive:19002
      - LOG_HEALTH_ACCESS_MODE=off
    depends_on:
      hub:
        condition: service_started
    networks:
      - hestia_net

  ingest:
    build:
      context: ./Hestia-Ingest
    container_name: hestia_ingest
    restart: unless-stopped
    ports:
      - "19003:19003"
    env_file:
      - ./Hestia-Ingest/app/.env
    environment:
      - HUB_API_URL=http://hestia_hub:19001/api
      - INGEST_SERVICE_BASE_URL=http://hestia_ingest:19003
      - ARCHIVE_API_URL=http://hestia_archive:19002/api/archive
      - LOG_HEALTH_ACCESS_MODE=off
      - PYTHONUNBUFFERED=1
    volumes:
      - ./Hestia-Ingest/data:/code/data
    depends_on:
      hub:
        condition: service_started
      archive:
        condition: service_started
    networks:
      - hestia_net

  oracle:
    build:
      context: ./Hestia-Oracle
    container_name: hestia_oracle
    restart: unless-stopped
    ports:
      - "19004:19004"
    env_file:
      - ./Hestia-Oracle/app/.env
    environment:
      - HUB_API_URL=http://hestia_hub:19001/api
      - ORACLE_SERVICE_BASE_URL=http://hestia_oracle:19004
      - ARCHIVE_API_URL=http://hestia_archive:19002/api
      - MODULE_TOOLS_URL=
      - OLLAMA_URL=http://host.docker.internal:11434/api/generate
      - LOG_HEALTH_ACCESS_MODE=off
      - PYTHONUNBUFFERED=1
    depends_on:
      hub:
        condition: service_started
      archive:
        condition: service_started
    networks:
      - hestia_net

  hermes:
    build:
      context: ./Hestia-Hermes
    container_name: hestia_hermes
    restart: unless-stopped
    ports:
      - "19005:19005"
    environment:
      - HUB_API_URL=http://hestia_hub:19001/api
      - HERMES_SERVICE_BASE_URL=http://hestia_hermes:19005
      - ARCHIVE_API_URL=http://hestia_archive:19002/api
      - LOG_HEALTH_ACCESS_MODE=off
      - PYTHONUNBUFFERED=1
    depends_on:
      hub:
        condition: service_started
      archive:
        condition: service_started
    networks:
      - hestia_net

  telegram:
    build:
      context: ./Hestia-Telegram
    container_name: hestia_telegram
    restart: unless-stopped
    env_file:
      - ./Hestia-Telegram/app/.env
    environment:
      - HUB_API_URL=http://hestia_hub:19001/api
      - ORACLE_API_URL=http://hestia_oracle:19004/api/chat
      - LOG_HEALTH_ACCESS_MODE=off
      - PYTHONUNBUFFERED=1
    volumes:
      - ./Hestia-Telegram/data:/code/data
    depends_on:
      hub:
        condition: service_started
      oracle:
        condition: service_started
    networks:
      - hestia_net

  dummy:
    build:
      context: ./Hestia-Dummy
    container_name: hestia_dummy
    restart: unless-stopped
    ports:
      - "19011:19011"
    environment:
      - HUB_API_URL=http://hestia_hub:19001/api
      - SERVICE_NAME=dummy
      - SERVICE_BASE_URL=http://hestia_dummy:19011
      - SERVICE_VERSION=1.0.0
      - SERVICE_TYPE=module
      - SERVICE_TAGS=module
      - DUMMY_PORT=19011
      - DUMMY_MUTATION_DELAY_MS=80
      - LOG_HEALTH_ACCESS_MODE=off
      - PYTHONUNBUFFERED=1
    depends_on:
      hub:
        condition: service_started
    networks:
      - hestia_net

networks:
  hestia_net:
    external: true
    name: hestia_net
