  /api/events/ingest:
    post:
      tags: [Hermes]
      summary: Ingest a domain event — matches subscriptions and dispatches notifications
      servers:
        - url: http://localhost:19005
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/HermesEventRequest"
      responses:
        "200":
          description: "{status: ok, result: {subscriptions_matched, deliveries, ...}}"

  /api/dispatch/send:
    post:
      tags: [Hermes]
      summary: Send a direct message to a channel target
      servers:
        - url: http://localhost:19005
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DispatchSendRequest"
      responses:
        "200":
          description: "{success, detail}"

  /api/outbound-events/state:
    post:
      tags: [Hermes]
      summary: Update lifecycle state for a tracked outbound event
      servers:
        - url: http://localhost:19005
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [outbound_event_id, lifecycle_state]
              properties:
                outbound_event_id:
                  type: string
                lifecycle_state:
                  type: string
                  enum:
                    [
                      created,
                      queued,
                      delivered,
                      seen,
                      answered,
                      dismissed,
                      superseded,
                      failed,
                    ]
                detail:
                  type: string
                superseded_by:
                  type: string
      responses:
        "200":
          description: "{status, updated}"

  # ══════════════════════════════════════════════════════════════════════════
  #  SCOUT — 19006
  #  Note: expose port 19006 in docker-compose.global.yml to test locally
  # ══════════════════════════════════════════════════════════════════════════

  /scout/health:
    get:
      tags: [Scout]
      summary: Scout health check
      servers:
        - url: http://localhost:19006
      responses:
        "200":
          description: OK

  /api/module-tools/domains:
    get:
      tags: [Scout]
      summary: List domains served by Scout module tools
      servers:
        - url: http://localhost:19006
      responses:
        "200":
          description: '{domains: ["real_estate"]}'

  /api/module-tools/query:
    post:
      tags: [Scout]
      summary: Query entities via module-tool interface
      servers:
        - url: http://localhost:19006
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ModuleToolQueryRequest"
      responses:
        "200":
          description: "{domain, items: [...]}"

  /api/tools:
    get:
      tags: [Scout]
      summary: List available Scout tools
      servers:
        - url: http://localhost:19006
      responses:
        "200":
          description: "{tools: [{name, path, description}]}"

  /api/tools/real_estate/search:
    post:
      tags: [Scout]
      summary: Search real estate listings
      servers:
        - url: http://localhost:19006
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RealEstateSearchRequest"
      responses:
        "200":
          description: List of real estate entity items

  # ══════════════════════════════════════════════════════════════════════════
  #  CHRONOS — 19007
  # ══════════════════════════════════════════════════════════════════════════

  /chronos/health:
    get:
      tags: [Chronos]
      summary: Chronos health check (includes provider status)
      servers:
        - url: http://localhost:19007
      responses:
        "200":
          description: "{status, service, providers: {active[], unavailable{}}}"

  /api/calendar/events:
    post:
      tags: [Chronos]
      summary: Create a calendar event in one or more providers
      servers:
        - url: http://localhost:19007
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateEventRequest"
      responses:
        "200":
          description: "{results[{provider, success, event_id?, error?}], total_created, total_failed}"

  /api/calendar/events/list:
    post:
      tags: [Chronos]
      summary: List events from calendar providers
      servers:
        - url: http://localhost:19007
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ListEventsRequest"
      responses:
        "200":
          description: "{events[...], provider_errors{}}"

  /api/calendar/events/{event_id}:
    delete:
      tags: [Chronos]
      summary: Delete a calendar event
      servers:
        - url: http://localhost:19007
      parameters:
        - name: event_id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [provider]
              properties:
                provider:
                  type: string
                calendar_id:
                  type: string
                  default: primary
      responses:
        "200":
          description: "{success: true}"
    patch:
      tags: [Chronos]
      summary: Update a calendar event
      servers:
        - url: http://localhost:19007
      parameters:
        - name: event_id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [provider, updates]
              properties:
                provider:
                  type: string
                updates:
                  type: object
                  additionalProperties: true
                calendar_id:
                  type: string
                  default: primary
      responses:
        "200":
          description: "{success: true}"

  /api/calendar/providers:
    get:
      tags: [Chronos]
      summary: List active calendar providers
      servers:
        - url: http://localhost:19007
      responses:
        "200":
          description: "{active[], unavailable{}}"

  /api/calendar/agenda:
    get:
      tags: [Chronos]
      summary: Get upcoming agenda from Archive
      servers:
        - url: http://localhost:19007
      parameters:
        - name: days
          in: query
          schema:
            type: integer
            default: 7
            minimum: 1
            maximum: 90
        - name: source
          in: query
          schema:
            type: string
        - name: kind
          in: query
          schema:
            type: string
            enum: [event, task, reminder]
      responses:
        "200":
          description: "{from, to, days, count, items[...]}"

  # ══════════════════════════════════════════════════════════════════════════
  #  ARGUS — 19008
  # ══════════════════════════════════════════════════════════════════════════

  /argus/health:
    get:
      tags: [Argus]
      summary: Argus health check
      servers:
        - url: http://localhost:19008
      responses:
        "200":
          description: OK

  /api/argus/status:
    get:
      tags: [Argus]
      summary: Health status of all monitored services
      servers:
        - url: http://localhost:19008
      responses:
        "200":
          description: "{healthy_count, unhealthy_count, services: {name: {status, ...}}}"

  /api/argus/logs:
    get:
      tags: [Argus]
      summary: Query collected service logs
      servers:
        - url: http://localhost:19008
      parameters:
        - name: service
          in: query
          schema:
            type: string
        - name: level
          in: query
          schema:
            type: string
            default: WARNING
        - name: since
          in: query
          schema:
            type: string
            default: 30m
          description: "e.g. '30m', '2h', '1d'"
      responses:
        "200":
          description: "{count, filters{}, events[]}"

  /api/argus/analyze:
    post:
      tags: [Argus]
      summary: Run an LLM system analysis across all monitored logs
      servers:
        - url: http://localhost:19008
      responses:
        "200":
          description: "SystemReport: {status, summary (LLM text), events[], ...}"
