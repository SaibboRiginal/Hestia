openapi: 3.0.3

info:
  title: Hestia — API Reference
  description: |
    Aggregated API reference for all Hestia services.
    Each path overrides the server URL to route to the correct service.

    | Service   | Port  |
    |-----------|-------|
    | Hub       | 19001 |
    | Archive   | 19002 |
    | Ingest    | 19003 |
    | Oracle    | 19004 |
    | Hermes    | 19005 |
    | Scout     | 19006 |
    | Chronos   | 19007 |
    | Argus     | 19008 |
  version: 1.0.0

servers:
  - url: http://localhost:19001
    description: Hub (default)

tags:
  - name: Hub
    description: Service registry and request routing
  - name: Archive — Records
    description: Raw domain records ingested from external sources
  - name: Archive — Entities
    description: Structured persistent entities (real estate listings, etc.)
  - name: Archive — Chat
    description: Conversation history
  - name: Archive — Memory
    description: User preferences and long-term memory
  - name: Archive — Subscriptions
    description: Proactive notification subscriptions
  - name: Archive — Dispatch Logs
    description: Delivery logs for dispatched notifications
  - name: Archive — Outbound Events
    description: Outbound delivery lifecycle and dedupe tracking
  - name: Archive — Feedback
    description: Quality feedback records and JSONL export
  - name: Archive — Calendar
    description: Calendar items (events, tasks, reminders)
  - name: Archive — Documents
    description: Uploaded and indexed documents with embeddings
  - name: Ingest
    description: Data ingestion triggers
  - name: Oracle
    description: LLM chat, document analysis and formatting
  - name: Hermes
    description: Event-driven dispatch and direct messaging
  - name: Scout
    description: Real estate search and module tools
  - name: Chronos
    description: Calendar CRUD and agenda
  - name: Argus
    description: System health monitoring and log analysis

# ─────────────────────────────────────────────────────────────────────────────
#  Shared components
# ─────────────────────────────────────────────────────────────────────────────
components:
  schemas:
    HealthResponse:
      type: object
      properties:
        status:
          type: string
          example: ok
        service:
          type: string
          example: hestia_hub

    # ── Hub ───────────────────────────────────────────────────────────────────
    RegisterServiceRequest:
      type: object
      required:
        [name, base_url, health_endpoint, service_type, service_version, tags]
      properties:
        name:
          type: string
          pattern: "^[a-z0-9_-]{2,40}$"
          example: my_service
        base_url:
          type: string
          example: http://hestia_myservice:9999
        health_endpoint:
          type: string
          example: /health
        service_type:
          type: string
          enum: [core, module, integration]
        service_version:
          type: string
          example: 1.0.0
        tags:
          type: array
          items:
            type: string
            enum:
              [
                core,
                module,
                storage,
                connector,
                chat,
                dispatch,
                real_estate,
                integration,
                messaging,
                monitoring,
              ]
        capabilities:
          type: object
          additionalProperties: true

    RouteRequest:
      type: object
      required: [method]
      properties:
        method:
          type: string
          enum: [GET, POST, PUT, PATCH, DELETE]
        headers:
          type: object
          additionalProperties:
            type: string
        query:
          type: object
          additionalProperties: true
        body:
          type: object
          additionalProperties: true
        timeout_seconds:
          type: number
          default: 8.0

    # ── Archive ───────────────────────────────────────────────────────────────
    ArchiveRecord:
      type: object
      required: [domain, source, payload]
      properties:
        reference_id:
          type: string
        domain:
          type: string
          example: real_estate
        source:
          type: string
          example: immobiliare_it
        payload:
          type: object
          additionalProperties: true

    EntityUpsertRequest:
      type: object
      required: [entity_id, domain, payload]
      properties:
        entity_id:
          type: string
        domain:
          type: string
        status:
          type: string
          default: active
        payload:
          type: object
          additionalProperties: true
        embedding:
          type: array
          items:
            type: number

    EntitySearchRequest:
      type: object
      properties:
        domain:
          type: string
        limit:
          type: integer
          default: 50
        query_vector:
          type: array
          items:
            type: number
        filters:
          type: object
          additionalProperties: true
        filters_gt:
          type: object
          additionalProperties: true
        filters_lt:
          type: object
          additionalProperties: true
        sort_by:
          type: string
        sort_order:
          type: string
          enum: [asc, desc]

    ChatMessageRequest:
      type: object
      required: [session_id, role, content]
      properties:
        session_id:
          type: string
        role:
          type: string
          enum: [user, assistant, system]
        content:
          type: string

    PreferenceRequest:
      type: object
      required: [fact]
      properties:
        fact:
          type: string
          example: Preferisce risposte brevi
        domain:
          type: string
          default: general
        weight:
          type: number
          default: 1.0

    SubscriptionRequest:
      type: object
      required: [subscription_id, owner, domain, event_type, filters, channels]
      properties:
        subscription_id:
          type: string
        owner:
          type: string
        domain:
          type: string
        event_type:
          type: string
        filters:
          type: object
          additionalProperties: true
        channels:
          type: array
          items:
            type: string
        is_active:
          type: boolean
          default: true

    CalendarItemRequest:
      type: object
      required: [source, kind, title, start_at]
      properties:
        external_id:
          type: string
        source:
          type: string
          example: google
        kind:
          type: string
          enum: [event, task, reminder]
        title:
          type: string
        description:
          type: string
        start_at:
          type: string
          format: date-time
        end_at:
          type: string
          format: date-time
        all_day:
          type: boolean
          default: false
        location:
          type: string
        attendees:
          type: array
          items:
            type: object
        recurrence:
          type: string
        status:
          type: string
          default: confirmed
        html_link:
          type: string
        nag_enabled:
          type: boolean
          default: true

    DocumentRequest:
      type: object
      required: [document_id]
      properties:
        document_id:
          type: string
        session_id:
          type: string
        chat_id:
          type: string
        filename:
          type: string
        mime_type:
          type: string
        file_size_bytes:
          type: integer
        file_hash:
          type: string
        title:
          type: string
        summary:
          type: string
        extracted_text:
          type: string
        embedding:
          type: array
          items:
            type: number
        is_permanent:
          type: boolean
          default: false
        domain:
          type: string
        tags:
          type: array
          items:
            type: string
        chunks:
          type: array
          items:
            type: object
            properties:
              chunk_index:
                type: integer
              chunk_text:
                type: string
              embedding:
                type: array
                items:
                  type: number

    # ── Oracle ────────────────────────────────────────────────────────────────
    ChatRequest:
      type: object
      required: [message]
      properties:
        message:
          type: string
        session_id:
          type: string
        notify_target:
          type: string
        force_notification_compiler:
          type: boolean
          default: false
        client_instructions:
          type: string

    FormatRequest:
      type: object
      required: [command, payload]
      properties:
        command:
          type: string
        payload:
          type: object
          additionalProperties: true
        response_prompt:
          type: string
        client_instructions:
          type: string
        thinking:
          type: boolean
          default: false
        max_length:
          type: integer
        locale:
          type: string
          default: it

    # ── Hermes ────────────────────────────────────────────────────────────────
    HermesEventRequest:
      type: object
      required: [event_type, domain, entity_id, payload]
      properties:
        event_type:
          type: string
          example: new_listing
        domain:
          type: string
          example: real_estate
        entity_id:
          type: string
        payload:
          type: object
          additionalProperties: true
        event_ts:
          type: string
          format: date-time

    DispatchSendRequest:
      type: object
      required: [channel, target, message]
      properties:
        channel:
          type: string
          example: telegram
        target:
          type: string
          example: "5770661128"
        message:
          type: string
        metadata:
          type: object
          additionalProperties: true

    OutboundEventUpsertRequest:
      type: object
      required: [outbound_event_id, dedupe_key, lifecycle_state, event_type]
      properties:
        outbound_event_id:
          type: string
        dedupe_key:
          type: string
        lifecycle_state:
          type: string
          enum:
            [
              created,
              queued,
              delivered,
              seen,
              answered,
              dismissed,
              superseded,
              failed,
            ]
        event_type:
          type: string
        domain:
          type: string
        entity_id:
          type: string
        subscription_id:
          type: string
        channel:
          type: string
        target:
          type: string
        question_id:
          type: string
        brief_id:
          type: string
        source_service:
          type: string
        superseded_by:
          type: string
        detail:
          type: string
        payload:
          type: object
          additionalProperties: true

    OutboundEventStateUpdateRequest:
      type: object
      required: [lifecycle_state]
      properties:
        lifecycle_state:
          type: string
          enum:
            [
              created,
              queued,
              delivered,
              seen,
              answered,
              dismissed,
              superseded,
              failed,
            ]
        detail:
          type: string
        superseded_by:
          type: string

    # ── Chronos ───────────────────────────────────────────────────────────────
    CalendarEvent:
      type: object
      required: [title, start_datetime, end_datetime]
      properties:
        title:
          type: string
        description:
          type: string
        start_datetime:
          type: string
          format: date-time
        end_datetime:
          type: string
          format: date-time
        location:
          type: string
        timezone:
          type: string
          default: Europe/Rome
        all_day:
          type: boolean
          default: false
        reminders_minutes_before:
          type: array
          items:
            type: integer
          default: [30]
        source_reference:
          type: string

    CreateEventRequest:
      type: object
      required: [event]
      properties:
        event:
          $ref: "#/components/schemas/CalendarEvent"
        target_providers:
          type: array
          items:
            type: string
          default: []
        calendar_id:
          type: string
          default: primary

    ListEventsRequest:
      type: object
      required: [start_datetime, end_datetime]
      properties:
        start_datetime:
          type: string
          format: date-time
        end_datetime:
          type: string
          format: date-time
        target_providers:
          type: array
          items:
            type: string
        calendar_id:
          type: string
          default: primary
        max_results:
          type: integer
          default: 50
          minimum: 1
          maximum: 250

    # ── Scout ─────────────────────────────────────────────────────────────────
    ModuleToolQueryRequest:
      type: object
      required: [domain]
      properties:
        domain:
          type: string
          example: real_estate
        query:
          type: string
        session_id:
          type: string
        limit:
          type: integer
          default: 20
          minimum: 1
          maximum: 50
        filters:
          type: object
          additionalProperties: true
        filters_gt:
          type: object
          additionalProperties: true
        filters_lt:
          type: object
          additionalProperties: true
        sort_by:
          type: string
        sort_order:
          type: string
          enum: [asc, desc]
        preferences:
          type: array
          items:
            type: object

    RealEstateSearchRequest:
      type: object
      properties:
        query:
          type: string
        limit:
          type: integer
          default: 20
          minimum: 1
          maximum: 50
        city:
          type: string
        nearby:
          type: string
        radius_km:
          type: number
        price_max:
          type: number
        price_min:
          type: number
        rooms_min:
          type: integer
        surface_min:
          type: number

# ─────────────────────────────────────────────────────────────────────────────
#  Paths
# ─────────────────────────────────────────────────────────────────────────────
paths:
  # ══════════════════════════════════════════════════════════════════════════
  #  HUB — 19001
  # ══════════════════════════════════════════════════════════════════════════

  /health:
    get:
      tags: [Hub]
      summary: Hub health check
      servers:
        - url: http://localhost:19001
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"

  /api/registry/register:
    post:
      tags: [Hub]
      summary: Register a service
      servers:
        - url: http://localhost:19001
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterServiceRequest"
      responses:
        "200":
          description: Registered

  /api/registry/deregister:
    post:
      tags: [Hub]
      summary: Deregister a service
      servers:
        - url: http://localhost:19001
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name:
                  type: string
                base_url:
                  type: string
      responses:
        "200":
          description: Deregistered

  /api/registry/revision:
    get:
      tags: [Hub]
      summary: Get current registry revision number
      servers:
        - url: http://localhost:19001
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  revision:
                    type: integer
                  updated_at:
                    type: string
                  services_count:
                    type: integer

  /api/registry/services:
    get:
      tags: [Hub]
      summary: List all registered services
      servers:
        - url: http://localhost:19001
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  services:
                    type: array
                    items:
                      type: object

  /api/discovery/commands:
    get:
      tags: [Hub]
      summary: Discover all routable commands
      servers:
        - url: http://localhost:19001
      parameters:
        - name: client
          in: query
          schema:
            type: string
          example: telegram
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  commands:
                    type: array
                    items:
                      type: object

  /api/discovery/module-tools:
    get:
      tags: [Hub]
      summary: Discover module-tool endpoints
      servers:
        - url: http://localhost:19001
      responses:
        "200":
          description: OK

  /api/status:
    get:
      tags: [Hub]
      summary: Health status of all registered services
      servers:
        - url: http://localhost:19001
      responses:
        "200":
          description: OK

  /api/standards/registration:
    get:
      tags: [Hub]
      summary: Registration standards and allowed values
      servers:
        - url: http://localhost:19001
      responses:
        "200":
          description: OK

  /api/logs:
    get:
      tags: [Hub]
      summary: Retrieve buffered runtime logs (service-local endpoint)
      description: |
        Implemented in all runtime services.
        Current instances:
        - Hub (19001)
        - Archive (19002)
        - Ingest (19003)
        - Oracle (19004)
        - Hermes (19005)
        - Scout (19006)
        - Chronos (19007)
        - Argus (19008)
        - Athena (19009)
        - Hephaestus (19010)
        - Telegram control API (internal: hestia_telegram:8010)

        Sensitive values (tokens, passwords, secrets, credential URLs, auth headers)
        are redacted before entries are buffered and returned.

        Use query filters to keep output dense and useful for troubleshooting.
      servers:
        - url: http://localhost:19001
          description: Hub
        - url: http://localhost:19002
          description: Archive
        - url: http://localhost:19003
          description: Ingest
        - url: http://localhost:19004
          description: Oracle
        - url: http://localhost:19005
          description: Hermes
        - url: http://localhost:19006
          description: Scout
        - url: http://localhost:19007
          description: Chronos
        - url: http://localhost:19008
          description: Argus
        - url: http://localhost:19009
          description: Athena
        - url: http://localhost:19010
          description: Hephaestus
        - url: http://hestia_telegram:8010
          description: Telegram control API (Docker network)
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 200
            maximum: 2000
        - name: level
          in: query
          schema:
            type: string
            example: INFO
        - name: contains
          in: query
          schema:
            type: string
            example: outbound_event_id=p2-4-smoke-3
      responses:
        "200":
          description: "{service, count, logs[]}"

  /api/monitor/logs/{service_name}:
    get:
      tags: [Hub]
      summary: Retrieve logs for a registered service through Hub monitoring proxy
      description: |
        Supports multiple output modes:
        - raw: original proxied payload
        - text/transcribe: flattened plain-text log stream
        - ai/analyze/summary: Oracle-formatted analysis, with text fallback
      servers:
        - url: http://localhost:19001
      parameters:
        - name: service_name
          in: path
          required: true
          schema:
            type: string
          example: archive
        - name: limit
          in: query
          schema:
            type: integer
            default: 200
            maximum: 2000
        - name: level
          in: query
          schema:
            type: string
            example: WARNING
        - name: contains
          in: query
          schema:
            type: string
            example: event=hub_register_non_success
        - name: mode
          in: query
          schema:
            type: string
            enum: [raw, text, transcribe, ai, analyze, summary]
            default: raw
        - name: response_prompt
          in: query
          schema:
            type: string
            example: Summarize critical errors and actionable next checks.
        - name: include_raw
          in: query
          schema:
            type: boolean
            default: false
        - name: timeout_seconds
          in: query
          schema:
            type: number
            default: 8.0
      responses:
        "200":
          description: "Mode-dependent payload. Raw: {status_code, service, target, payload}; Text/AI: {status_code, service, target, mode, text, line_count[, payload]}"

  /api/route/{service_name}/{path}:
    post:
      tags: [Hub]
      summary: Route a request to a registered service
      servers:
        - url: http://localhost:19001
      parameters:
        - name: service_name
          in: path
          required: true
          schema:
            type: string
          example: archive
        - name: path
          in: path
          required: true
          schema:
            type: string
          example: api/entities
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RouteRequest"
      responses:
        "200":
          description: Proxied response from the target service

  # ══════════════════════════════════════════════════════════════════════════
  #  ARCHIVE — 19002
  # ══════════════════════════════════════════════════════════════════════════

  /archive/health:
    get:
      tags: [Archive — Records]
      summary: Archive health check
      servers:
        - url: http://localhost:19002
      responses:
        "200":
          description: OK

  /api/archive:
    post:
      tags: [Archive — Records]
      summary: Ingest a raw domain record
      servers:
        - url: http://localhost:19002
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ArchiveRecord"
      responses:
        "200":
          description: Saved record

  /api/archive/{domain}/unevaluated:
    get:
      tags: [Archive — Records]
      summary: List unevaluated records for a domain
      servers:
        - url: http://localhost:19002
      parameters:
        - name: domain
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: List of records

  /api/archive/{record_id}:
    patch:
      tags: [Archive — Records]
      summary: Mark a record as evaluated
      servers:
        - url: http://localhost:19002
      parameters:
        - name: record_id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                evaluation:
                  type: object
      responses:
        "200":
          description: Updated record

  /api/domains:
    get:
      tags: [Archive — Entities]
      summary: List all known entity domains
      servers:
        - url: http://localhost:19002
      responses:
        "200":
          description: List of domain strings

  /api/schemas:
    get:
      tags: [Archive — Entities]
      summary: Entity field schemas per domain
      servers:
        - url: http://localhost:19002
      responses:
        "200":
          description: Map of domain to field list

  /api/entities:
    post:
      tags: [Archive — Entities]
      summary: Create or update an entity
      servers:
        - url: http://localhost:19002
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EntityUpsertRequest"
      responses:
        "200":
          description: Entity
    get:
      tags: [Archive — Entities]
      summary: List active entities (flat format)
      servers:
        - url: http://localhost:19002
      parameters:
        - name: domain
          in: query
          schema:
            type: string
      responses:
        "200":
          description: List of entity dicts

  /api/entities/records:
    get:
      tags: [Archive — Entities]
      summary: List entities with full record metadata
      servers:
        - url: http://localhost:19002
      parameters:
        - name: domain
          in: query
          schema:
            type: string
        - name: status
          in: query
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
            default: 100
      responses:
        "200":
          description: List of EntityResponse

  /api/entities/search:
    post:
      tags: [Archive — Entities]
      summary: Search entities with filters or vector similarity
      servers:
        - url: http://localhost:19002
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EntitySearchRequest"
      responses:
        "200":
          description: Matched entity dicts

  /api/entities/cleanup:
    post:
      tags: [Archive — Entities]
      summary: Delete entities missing required fields
      servers:
        - url: http://localhost:19002
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                domain:
                  type: string
                required_fields:
                  type: array
                  items:
                    type: string
                require_created_at:
                  type: boolean
                delete_limit:
                  type: integer
                dry_run:
                  type: boolean
                  default: true
      responses:
        "200":
          description: Cleanup result

  /api/chat/history/all:
    get:
      tags: [Archive — Chat]
      summary: Get all chat history
      servers:
        - url: http://localhost:19002
      responses:
        "200":
          description: All messages
    delete:
      tags: [Archive — Chat]
      summary: Delete all chat history
      servers:
        - url: http://localhost:19002
      responses:
        "200":
          description: Deleted count

  /api/chat/history:
    post:
      tags: [Archive — Chat]
      summary: Append a chat message
      servers:
        - url: http://localhost:19002
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChatMessageRequest"
      responses:
        "200":
          description: Saved message

  /api/chat/history/{session_id}:
    get:
      tags: [Archive — Chat]
      summary: Get chat history for a session
