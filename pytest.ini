[pytest]
# ── Test discovery ──────────────────────────────────────────────────────────
testpaths =
    Hestia-Oracle/tests
    Hestia-Telegram/tests
    Hestia-Athena/tests
    Hestia-Hub/tests
    Hestia-Archive/tests
    Hestia-Hermes/tests
    Hestia-Hecate/tests
    Hestia-Chronos/tests
    Hestia-Iris/tests
    Hestia-Argus/tests
    Hestia-Hephaestus/tests
    Hestia-Scout/tests
    Hestia-Atlas/tests
    Hestia-Dummy/tests

# ── Markers ────────────────────────────────────────────────────────────────
markers =
    unit: Fast, fully mocked unit tests. No network, no LLM.
    api: FastAPI TestClient endpoint tests with mocked dependencies.
    format: Output format contract tests (HTML/Markdown/splitting). Always fast.
    llm_live: Live Ollama-backed integration tests. Requires local Ollama running. Primary test engine for tool-calling validation.
    integration: Cross-service integration tests with Ollama + mocked Hub/Archive.

# ── Execution defaults ─────────────────────────────────────────────────────
addopts =
    -v
    --tb=short
    --strict-markers

# ── Timeout ───────────────────────────────────────────────────────────────
# Require pytest-timeout: pip install pytest-timeout
# timeout = 30  # Uncomment after installing pytest-timeout

# ── Filter warnings ────────────────────────────────────────────────────────
filterwarnings =
    ignore::DeprecationWarning:telebot.*
    ignore::DeprecationWarning:google.*
