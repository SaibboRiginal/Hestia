services:
  scout:
    build: .
    container_name: hestia_scout
    restart: always
    env_file:
      - ./app/.env
    environment:
      - PYTHONUNBUFFERED=1               # flush stdout/stderr immediately (required for Docker log streaming)
      - ARCHIVE_API_URL=http://hestia_archive:19002/api/archive  # Archive API base URL for record retrieval
      - INGEST_API_URL=http://hestia_hecate:19003/api             # Hecate API alias for triggering fetches
      - HUB_API_URL=http://hestia_hub:19001/api                   # Hub base URL for service registration and routing
      - SCOUT_SERVICE_BASE_URL=http://hestia_scout:19006          # This service's public URL as seen by Hub
      - SCOUT_TOOLS_PORT=19006            # Port for the Scout tools HTTP API (int, default 19006)
      - SCOUT_SERVICE_VERSION=1.0.0       # Reported version in Hub registry
      - SCOUT_POLL_INTERVAL_SECONDS=1800  # Seconds between email polling cycles (int, default 1800 = 30 min)
      - STARTUP_WAIT_TIMEOUT_SECONDS=0    # Seconds to wait for Hub/dependency readiness at startup (0 = wait indefinitely)
      - LOG_LEVEL=INFO                    # Logging verbosity: DEBUG | INFO | WARNING | ERROR
    networks:
      - hestia_net

networks:
  hestia_net:
    external: true