services:
  oracle:
    build:
      context: .
    container_name: hestia_oracle
    restart: always
    ports:
      - "19004:19004"  # Oracle API port
    environment:
      - ARCHIVE_API_URL=http://hestia_archive:19002/api      # Archive API base URL for memory, entities, history
      # Module tools are discovered dynamically via Hub (/api/discovery/module-tools
      # and /api/registry/services).  No hardcoded peer URLs — Hub routing is the
      # single source of truth for which modules are alive.
      # MODULE_TOOLS_URL=  (legacy — leave empty to use Hub discovery exclusively)
      - HUB_API_URL=http://hestia_hub:19001/api              # Hub base URL for routing and service registration
      - ORACLE_SERVICE_BASE_URL=http://hestia_oracle:19004   # This service's public URL as seen by Hub
      - ORACLE_SERVICE_VERSION=1.0.0                         # Reported version in Hub registry
      - OLLAMA_URL=http://host.docker.internal:11434/api/generate  # Ollama generate endpoint (local LLM)
      - LOG_LEVEL=INFO                                       # Logging verbosity: DEBUG | INFO | WARNING | ERROR
      - PYTHONUNBUFFERED=1                                   # flush stdout/stderr immediately (required for Docker log streaming)
      # Tuning parameters (set in app/.env or override here):
      # ORACLE_HISTORY_LIMIT=6          number of past messages included in context (int)
      # ORACLE_HISTORY_CHAR_LIMIT=500   max chars per history message before truncation (int)
      # ORACLE_CONTEXT_ENTITIES_LIMIT=12  max entities injected into the analysis prompt (int)
      # ORACLE_CONTEXT_FIELD_CHAR_LIMIT=280  max chars per entity field value (int)
      # ORACLE_TOOL_RESULT_MAX_CHARS=2000  max chars retained from each tool result in agent loop (int)
      # MODULE_TOOL_REGISTRY_TTL_SECONDS=120  cache TTL for module-tool registry (int)
      # ORACLE_FORCE_TELEGRAM_TARGET=1  force all subscription channels to use the user's Telegram chat_id (0|1)
      # ── Enhancement Plan tuning (2026-06-18) ────────────────────────
      # ORACLE_CONTEXT_LENGTH=8192        context window size in tokens (int, default 8K)
      # ORACLE_COMPACT_THRESHOLD=0.80     compaction trigger at this fraction of window (float)
      # ORACLE_MAX_PARALLEL_TOOLS=8       max concurrent tool executions (int)
      # ORACLE_MAX_AGENT_TOKENS=0         max cumulative tokens per agent loop, 0=unlimited (int)
      # ORACLE_PREFERENCE_DOMAINS=        JSON override for preference domain definitions
      # ORACLE_PREF_DOMAIN_SIM_THRESHOLD=0.55  cosine similarity for domain assignment
      # ORACLE_THINKING_FAMILIES=gemma4,gemma3,qwen3,deepseek-r1,llama4,phi4  model families supporting think
      # MODEL_USECASE_GENERIC_THINKING=auto   "true"/"false"/"auto" — per-model think flag
      # MODEL_USECASE_REASONING_THINKING=true
      # MODEL_USECASE_CODE_THINKING=auto
    env_file:
      - ./app/.env
    networks:
      - hestia_net

networks:
  hestia_net:
    external: true