services:
  hub:
    build:
      context: .
      dockerfile: Hestia-Hub/Dockerfile
    container_name: hestia_hub
    restart: unless-stopped
    ports:
      - "19001:19001"  # Hub API port — must match HUB_API_URL on all other services
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - HUB_HEALTHCHECK_TIMEOUT=3    # seconds to wait when polling service /health (int, default 3)
      - HUB_NOTIFY_TIMEOUT=2         # seconds to wait when fanning out registry-change webhooks (float, default 2)
      - LOG_LEVEL=INFO               # logging verbosity: DEBUG | INFO | WARNING | ERROR
      - PYTHONUNBUFFERED=1           # flush stdout/stderr immediately (required for Docker log streaming)
    networks:
      - hestia_net

  archive_db:
    image: ankane/pgvector
    container_name: hestia_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: hestia_admin          # PostgreSQL superuser name
      POSTGRES_PASSWORD: super_secret_local_password  # PostgreSQL password — change in production!
      POSTGRES_DB: hestia_memory           # Name of the primary database
    ports:
      - "5432:5432"  # Exposed for local psql access; remove in production
    volumes:
      - hestia_archive_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hestia_admin -d hestia_memory"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - hestia_net

  archive:
    build:
      context: .
      dockerfile: Hestia-Archive/Dockerfile
    container_name: hestia_archive
    restart: unless-stopped
    ports:
      - "19002:19002"  # Archive REST API port
    environment:
      - DATABASE_URL=postgresql://hestia_admin:super_secret_local_password@archive_db:5432/hestia_memory  # Full SQLAlchemy connection string
      - HUB_API_URL=http://hestia_hub:19001/api              # Hub base URL for service registration
      - ARCHIVE_SERVICE_BASE_URL=http://hestia_archive:19002  # This service's public URL as seen by Hub
      - ARCHIVE_SERVICE_VERSION=1.0.0                         # Reported version in Hub registry
      - LOG_LEVEL=INFO                                        # Logging verbosity: DEBUG | INFO | WARNING | ERROR
      - PYTHONUNBUFFERED=1
    depends_on:
      archive_db:
        condition: service_healthy
      hub:
        condition: service_started
    networks:
      - hestia_net

  ingest:
    build:
      context: .
      dockerfile: Hestia-Ingest/Dockerfile
    container_name: hestia_ingest
    restart: unless-stopped
    ports:
      - "19003:19003"  # Ingest API port
    env_file:
      - ./Hestia-Ingest/app/.env
    environment:
      - HUB_API_URL=http://hestia_hub:19001/api              # Hub base URL for routing and service registration
      - INGEST_SERVICE_BASE_URL=http://hestia_ingest:19003   # This service's public URL as seen by Hub
      - ARCHIVE_API_URL=http://hestia_archive:19002/api/archive  # Archive API for record retrieval
      - ARCHIVE_URL=http://hestia_archive:19002               # Archive base URL for direct calendar writes
      - CHRONOS_URL=http://hestia_chronos:19007               # Chronos base URL (calendar sync target)
      - INGEST_SERVICE_VERSION=1.0.0                          # Reported version in Hub registry
      - INGEST_CALENDAR_BACKFILL_DAYS=7                       # Days back to include when syncing calendar (int, default 7)
      - INGEST_ARCHIVE_ROUTE_TIMEOUT=8                        # Seconds to wait for Hub-routed Archive writes (int, default 8)
      - INGEST_CALENDAR_WRITE_TIMEOUT=10                      # Seconds to wait for direct calendar item writes (int, default 10)
      - LOG_LEVEL=INFO                                        # Logging verbosity: DEBUG | INFO | WARNING | ERROR
      - PYTHONUNBUFFERED=1
    volumes:
      - ./Hestia-Ingest/data:/code/data
    depends_on:
      hub:
        condition: service_started
      archive:
        condition: service_started
    networks:
      - hestia_net

  oracle:
    build:
      context: .
      dockerfile: Hestia-Oracle/Dockerfile
    container_name: hestia_oracle
    restart: unless-stopped
    ports:
      - "19004:19004"  # Oracle API port
    extra_hosts:
      - "host.docker.internal:host-gateway"
    env_file:
      - ./Hestia-Oracle/app/.env
    environment:
      - HUB_API_URL=http://hestia_hub:19001/api              # Hub base URL for routing and service registration
      - ORACLE_SERVICE_BASE_URL=http://hestia_oracle:19004   # This service's public URL as seen by Hub
      - ORACLE_SERVICE_VERSION=1.0.0                         # Reported version in Hub registry
      - ARCHIVE_API_URL=http://hestia_archive:19002/api      # Archive API for memory, entities, history
      - MODULE_TOOLS_URL=http://hestia_scout:19006/api/module-tools  # Primary module-tool endpoint (Scout)
      - OLLAMA_URL=http://host.docker.internal:11434/api/generate  # Ollama generate endpoint (local LLM)
      - LOG_LEVEL=INFO                                       # Logging verbosity: DEBUG | INFO | WARNING | ERROR
      - PYTHONPATH=/code                                     # Ensure shared package /code/hestia_common is importable
      - PYTHONUNBUFFERED=1
      # Tuning (override as needed):
      # ORACLE_HISTORY_LIMIT=6          past messages included in context (int)
      # ORACLE_HISTORY_CHAR_LIMIT=500   max chars per history message (int)
      # ORACLE_CONTEXT_ENTITIES_LIMIT=12  max entities in analysis prompt (int)
      # ORACLE_CONTEXT_FIELD_CHAR_LIMIT=280  max chars per entity field (int)
      # MODULE_TOOL_REGISTRY_TTL_SECONDS=120  module-tool cache TTL (int)
      # ORACLE_FORCE_TELEGRAM_TARGET=1  force subscription channels to user's chat_id (0|1)
    depends_on:
      hub:
        condition: service_started
      archive:
        condition: service_started
    networks:
      - hestia_net

  hermes:
    build:
      context: .
      dockerfile: Hestia-Hermes/Dockerfile
    container_name: hestia_hermes
    restart: unless-stopped
    ports:
      - "19005:19005"  # Hermes API port
    environment:
      - HUB_API_URL=http://hestia_hub:19001/api              # Hub base URL for routing and service registration
      - HERMES_SERVICE_BASE_URL=http://hestia_hermes:19005   # This service's public URL as seen by Hub
      - HERMES_SERVICE_VERSION=1.0.0                         # Reported version in Hub registry
      - ARCHIVE_API_URL=http://hestia_archive:19002/api      # Archive API for reading subscriptions and writing dispatch logs
      - ORACLE_API_URL=http://hestia_oracle:19004/api/chat   # Oracle endpoint for batch narration
      - ENTITY_BATCH_WINDOW_SECONDS=30                       # Settling window before dispatching a batch of entity alerts (float, default 30)
      - HERMES_HUB_REGISTER_RETRIES=8                        # Max Hub registration attempts on startup (int, default 8)
      - HERMES_HUB_REGISTER_RETRY_DELAY=2                    # Seconds between registration retry attempts (float, default 2)
      - LOG_LEVEL=INFO                                       # Logging verbosity: DEBUG | INFO | WARNING | ERROR
      - PYTHONUNBUFFERED=1
    depends_on:
      hub:
        condition: service_started
      archive:
        condition: service_started
    networks:
      - hestia_net

  telegram:
    build:
      context: .
      dockerfile: Hestia-Telegram/Dockerfile
    container_name: hestia_telegram
    restart: unless-stopped
    env_file:
      - ./Hestia-Telegram/app/.env
    environment:
      - HUB_API_URL=http://hestia_hub:19001/api              # Hub base URL for routing and service registration
      - ORACLE_API_URL=http://hestia_oracle:19004/api/chat   # Oracle chat endpoint URL
      - TELEGRAM_BASE_URL=http://hestia_telegram:8010        # This service's public URL (includes control port)
      - TELEGRAM_CONTROL_PORT=8010                           # Internal HTTP port for Hub dispatch and health (int, default 8010)
      - TELEGRAM_COMMAND_REFRESH_SECONDS=0                   # Seconds between command registry polls; 0 = webhook only (int)
      - ALERT_BUFFER_WINDOW_SECONDS=0.8                      # Seconds to buffer consecutive alerts before grouping (float)
      - LOG_LEVEL=INFO                                       # Logging verbosity: DEBUG | INFO | WARNING | ERROR
      - PYTHONUNBUFFERED=1
    volumes:
      - ./Hestia-Telegram/data:/code/data
    depends_on:
      hub:
        condition: service_started
      oracle:
        condition: service_started
    networks:
      - hestia_net

  swagger:
    image: swaggerapi/swagger-ui
    container_name: hestia_swagger
    restart: unless-stopped
    ports:
      - "19000:8080"  # Swagger UI — open http://localhost:19000
    environment:
      - URL=/swagger/swagger.yml           # Spec file served from the mounted volume
      - LAYOUT=BaseLayout
      - DEEP_LINKING=true
      - DISPLAY_OPERATION_ID=false
      - DEFAULT_MODELS_EXPAND_DEPTH=1
      - DEFAULT_MODEL_EXPAND_DEPTH=1
      - TRY_IT_OUT_ENABLED=true
    volumes:
      - ./Hestia-Swagger:/usr/share/nginx/html/swagger:ro  # Mount spec directory read-only
    networks:
      - hestia_net

  scout:
    build:
      context: .
      dockerfile: Hestia-Scout/Dockerfile
    container_name: hestia_scout
    restart: unless-stopped
    ports:
      - "19006:19006"  # Scout API port — exposed for direct testing via Swagger
    env_file:
      - ./Hestia-Scout/app/.env
    environment:
      - HUB_API_URL=http://hestia_hub:19001/api              # Hub base URL for routing and service registration
      - SCOUT_SERVICE_BASE_URL=http://hestia_scout:19006     # This service's public URL as seen by Hub
      - SCOUT_SERVICE_VERSION=1.0.0                          # Reported version in Hub registry
      - SCOUT_TOOLS_PORT=19006                               # Port for Scout tools HTTP API (int, default 19006)
      - SCOUT_POLL_INTERVAL_SECONDS=1800                     # Seconds between email polling cycles (int, default 1800 = 30 min)
      - INGEST_API_URL=http://hestia_ingest:19003/api        # Ingest API URL for triggering fetches
      - ARCHIVE_API_URL=http://hestia_archive:19002/api/archive  # Archive API for record retrieval
      - LOG_LEVEL=INFO                                       # Logging verbosity: DEBUG | INFO | WARNING | ERROR
      - PYTHONUNBUFFERED=1
    depends_on:
      hub:
        condition: service_started
      archive:
        condition: service_started
      ingest:
        condition: service_started
      hermes:
        condition: service_started
    networks:
      - hestia_net

  chronos:
    build:
      context: .
      dockerfile: Hestia-Chronos/Dockerfile
    container_name: hestia_chronos
    restart: unless-stopped
    ports:
      - "19007:19007"  # Chronos API port
    env_file:
      - ./Hestia-Chronos/app/.env
    environment:
      - HUB_API_URL=http://hestia_hub:19001/api              # Hub base URL for service registration
      - CALENDAR_SERVICE_BASE_URL=http://hestia_chronos:19007  # This service's public URL as seen by Hub
      - CALENDAR_PORT=19007                                  # Port this service listens on (int)
      - ARCHIVE_URL=http://hestia_archive:19002               # Archive base URL for calendar items
      - HERMES_URL=http://hestia_hermes:19005                 # Hermes URL for dispatching notifications
      - NOTIFY_TARGET=5770661128                             # Telegram chat_id for event reminders (string, required)
      - CHRONOS_NOTIFY_POLL_SECONDS=300                       # Seconds between notification polling cycles (int, default 300 = 5 min)
      - NOTIFY_LOOK_AHEAD_HOURS=26                            # Hours ahead to check for upcoming events (int, default 26)
      - LOG_LEVEL=INFO                                        # Logging verbosity: DEBUG | INFO | WARNING | ERROR
      - PYTHONUNBUFFERED=1
    depends_on:
      hub:
        condition: service_started
      archive:
        condition: service_started
      hermes:
        condition: service_started
    networks:
      - hestia_net

  argus:
    build:
      context: .
      dockerfile: Hestia-Argus/Dockerfile
    container_name: hestia_argus
    restart: unless-stopped
    ports:
      - "19008:19008"  # Argus API port
    environment:
      - HUB_API_URL=http://hestia_hub:19001/api              # Hub base URL for service registration
      - ARGUS_SERVICE_BASE_URL=http://hestia_argus:19008     # This service's public URL as seen by Hub
      - HERMES_API_URL=http://hestia_hermes:19005            # Hermes URL for alert dispatch
      - ORACLE_API_URL=http://hestia_oracle:19004/api/chat   # Oracle URL for AI-formatted alerts
      - ARGUS_PORT=19008                  # Port this service listens on (int)
      - ARGUS_POLL_INTERVAL=60            # Seconds between Docker log polling cycles (int, default 60)
      - ARGUS_LOG_BUFFER_SIZE=500         # Max log lines kept in memory per container (int, default 500)
      - ARGUS_LOG_BACKFILL_MINUTES=0      # Minutes of past logs to load on startup per container (int, default 5)
      - ARGUS_IGNORE_PATTERNS=OUTLOOK_CLIENT_ID and OUTLOOK_TENANT_ID must be set  # Comma-separated substrings to suppress from alerts
      - ALERT_BATCH_WINDOW_SECONDS=20     # Seconds to wait for burst to settle before sending a single batched notification (int, default 20)
      - ARGUS_NOTIFY_TARGET=5770661128  # Telegram chat_id for alert notifications (string, required for alerts)
      - ALERT_COOLDOWN_MINUTES=60         # Minimum minutes between repeated alerts per container (int, default 60)
      - HESTIA_DOCS_PATH=/hestia_root     # Mount path for the Hestia repo (for doc context)
      - LOG_LEVEL=INFO                    # Logging verbosity: DEBUG | INFO | WARNING | ERROR
      - PYTHONUNBUFFERED=1
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro  # Read-only Docker socket for log tailing
      - ./:/hestia_root:ro                            # Hestia repo root mounted for doc access
    depends_on:
      hub:
        condition: service_started
    networks:
      - hestia_net

  athena:
    build:
      context: .
      dockerfile: Hestia-Athena/Dockerfile
    container_name: hestia_athena
    restart: unless-stopped
    ports:
      - "19009:19009"  # Athena API port
    env_file:
      - ./Hestia-Athena/app/.env
    environment:
      - HUB_API_URL=http://hestia_hub:19001/api              # Hub base URL for service registration
      - SERVICE_NAME=athena                                  # Registered service name on Hub
      - SERVICE_BASE_URL=http://hestia_athena:19009          # This service's public URL as seen by Hub
      - SERVICE_VERSION=1.0.0                                # Reported version in Hub registry
      - SERVICE_TYPE=core                                    # Service category in Hub registry
      - SERVICE_TAGS=core                                    # Hub tags for routing/discovery
      - HERMES_API_URL=http://hestia_hermes:19005            # Hermes ingest API base URL
      - ATHENA_LOOP_ENABLED=1                                # Enable periodic focus brief loop (0|1)
      - ATHENA_BRIEF_INTERVAL_SECONDS=300                    # Seconds between periodic focus brief evaluations (int)
      - ATHENA_RELEVANCE_THRESHOLD=0.55                      # Gate threshold for emitting briefs (float 0..1)
      - LOG_LEVEL=INFO                                       # Logging verbosity: DEBUG | INFO | WARNING | ERROR
      - PYTHONUNBUFFERED=1
    depends_on:
      hub:
        condition: service_started
      hermes:
        condition: service_started
    networks:
      - hestia_net

  hephaestus:
    build:
      context: .
      dockerfile: Hestia-Hephaestus/Dockerfile
    container_name: hestia_hephaestus
    restart: unless-stopped
    ports:
      - "19010:19010"  # Hephaestus API port
    env_file:
      - ./Hestia-Hephaestus/app/.env
    environment:
      - HUB_API_URL=http://hestia_hub:19001/api              # Hub base URL for service registration
      - SERVICE_NAME=hephaestus                              # Registered service name on Hub
      - SERVICE_BASE_URL=http://hestia_hephaestus:19010      # This service's public URL as seen by Hub
      - SERVICE_VERSION=1.0.0                                # Reported version in Hub registry
      - SERVICE_TYPE=core                                    # Service category in Hub registry
      - SERVICE_TAGS=core                                    # Hub tags for routing/discovery
      - HEPHAESTUS_READ_ONLY_MODE=1                          # Keep Hephaestus in diagnostics-only mode (0|1)
      - HEPHAESTUS_ALLOW_PROD_EXECUTION=0                    # Block production execution in MVP (0|1)
      - LOG_LEVEL=INFO                                       # Logging verbosity: DEBUG | INFO | WARNING | ERROR
      - PYTHONUNBUFFERED=1
    depends_on:
      hub:
        condition: service_started
    networks:
      - hestia_net

# ── Swagger UI note ──────────────────────────────────────────────────────────
# After adding or changing any API endpoint, update Hestia-Swagger/swagger.yml.
# Run: docker compose -f docker-compose.global.yml up -d swagger
# Then open: http://localhost:19000

networks:
  hestia_net:
    external: true
    name: hestia_net

volumes:
  hestia_archive_pgdata:
