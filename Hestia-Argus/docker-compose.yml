services:
  argus:
    build: .
    container_name: hestia_argus
    restart: unless-stopped
    ports:
      - "19008:19008"  # Argus API port
    environment:
      - HUB_API_URL=http://hestia_hub:19001/api          # Hub base URL for service registration
      - ARGUS_SERVICE_BASE_URL=http://hestia_argus:19008  # This service's public URL as seen by Hub
      - HERMES_API_URL=http://hestia_hermes:19005         # Hermes URL for alert dispatch
      - ORACLE_API_URL=http://hestia_oracle:19004/api/chat  # Oracle URL for AI-formatted alerts
      - ARGUS_PORT=19008                  # Port this service listens on (int)
      - ARGUS_POLL_INTERVAL=60            # Seconds between Docker log polling cycles (int, default 60)
      - ARGUS_LOG_SOURCE=hub              # Log source: hub (recommended) | docker (legacy socket tail)
      - ARGUS_HUB_LOG_LIMIT=200           # Per-service max lines fetched from Hub monitor API per poll/report
      - ARGUS_LOG_SEEN_CACHE_SIZE=5000    # Dedup cache size for hub-sourced events to avoid repeated alerts
      - ARGUS_LOG_BUFFER_SIZE=500         # Max number of log lines kept in memory per container (int, default 500)
      - ARGUS_LOG_BACKFILL_MINUTES=5      # Minutes of past logs to load on startup per container (int, default 5)
      - ARGUS_IGNORE_HEALTH_ACCESS=true   # Ignore uvicorn health-check access lines in monitored container logs
      - ARGUS_AUTO_REMEDIATE_ENABLED=1    # Emit remediation intents to Hephaestus for newly unhealthy services (0|1)
      - ARGUS_AUTO_REMEDIATE_DRY_RUN=1    # Default remediation intents in dry-run mode (0|1)
      - ARGUS_AUTO_REMEDIATE_ENVIRONMENT=dev  # Environment forwarded to Hephaestus remediation tasks
      - ARGUS_REMEDIATE_TIMEOUT_SECONDS=15 # Hub-routed timeout for Hephaestus remediation requests (seconds)
      - ARGUS_NOTIFY_TARGET=              # Telegram chat_id that receives alert notifications (string, required for alerts)
      - ALERT_COOLDOWN_MINUTES=60         # Minimum minutes between repeated alerts for the same container (int, default 60)
      - STARTUP_WAIT_TIMEOUT_SECONDS=0    # Seconds to wait for Hub readiness before startup registration (0 = wait indefinitely)
      - HESTIA_DOCS_PATH=/hestia_root     # Path inside container where Hestia repo is mounted (for doc context)
      - LOG_LEVEL=INFO                    # Logging verbosity: DEBUG | INFO | WARNING | ERROR
      - LOG_HEALTH_ACCESS_MODE=debug      # Health endpoint access logging mode: info | debug | off
      - PYTHONUNBUFFERED=1                # flush stdout/stderr immediately (required for Docker log streaming)
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro  # Required only when ARGUS_LOG_SOURCE=docker
      - ../:/hestia_root:ro                            # Hestia repo root mounted for doc access
    networks:
      - hestia_net

networks:
  hestia_net:
    external: true
