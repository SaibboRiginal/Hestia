services:
  hestia_metis:
    build: .
    container_name: hestia_metis
    ports:
      - "${METIS_PORT:-19014}:19014"
    environment:
      - SERVICE_NAME=metis
      - SERVICE_BASE_URL=http://hestia_metis:19014
      - SERVICE_VERSION=1.0.0
      - SERVICE_TYPE=core
      - SERVICE_TAGS=core,improvement
      - SERVICE_TOPOLOGY_TAGS=layer:cognition,domain:improvement,status:alpha
      - HUB_API_URL=http://hestia_hub:19001/api
      - LOG_LEVEL=INFO
      - LOG_FORMAT=%(asctime)s | %(levelname)s | %(name)s | %(message)s
      - LOG_BUFFER_SIZE=2000
      - LOG_FORCE_RECONFIGURE=true
      - LOG_HEALTH_ACCESS_MODE=info
      # Dataset builder config
      - METIS_MAX_DATASET_EXAMPLES=5000
      - METIS_DEDUPLICATE_ENABLED=true
      - METIS_DEFAULT_QUALITY_LABELS=excellent,good
    networks:
      - hestia_net
    restart: unless-stopped

networks:
  hestia_net:
    external: true
