services:
  dummy:
    build: .
    container_name: hestia_dummy
    restart: unless-stopped
    ports:
      - "19011:19011"
    environment:
      - HUB_API_URL=http://hestia_hub:19001/api                 # Hub base URL for service registration
      - SERVICE_NAME=dummy                                      # Registered service name on Hub
      - SERVICE_BASE_URL=http://hestia_dummy:19011              # This service's public URL as seen by Hub
      - SERVICE_VERSION=1.0.0                                   # Reported version in Hub registry
      - SERVICE_TYPE=module                                     # Service category in Hub registry
      - SERVICE_TAGS=module                                     # Hub tags for routing/discovery
      - SERVICE_TOPOLOGY_TAGS=layer:testing,domain:mock,status:stable  # Topology taxonomy dimensions
      - DUMMY_PORT=19011                                        # HTTP port (int)
      - DUMMY_MUTATION_DELAY_MS=80                              # Simulated processing latency for mutation path (int)
      - LOG_LEVEL=INFO                                          # Logging verbosity: DEBUG | INFO | WARNING | ERROR
      - LOG_HEALTH_ACCESS_MODE=off                              # suppress uvicorn access logs for /health-style probes
      - PYTHONUNBUFFERED=1
    networks:
      - hestia_net

networks:
  hestia_net:
    external: true
